# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin 'egel/tmux-gruvbox'
set -g @plugin 'catppuccin/tmux'

set -g @plugin 'nhdaly/tmux-better-mouse-mode'

# easier navigation in tmux and neovim
set -g @plugin 'christoomey/vim-tmux-navigator'

# session manager
set -g @plugin 'omerxx/tmux-sessionx'
set -g @sessionx-bind 'o'

set -g @plugin 'tmux-plugins/tmux-resurrect'

set -g history-file ~/.tmux_history

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# set -g @tmux-gruvbox 'dark' # or 'light'
set -g @catppuccin_flavour 'mocha' # latte, frappe, macchiato, mocha

set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_text "#W"
set -g @catppuccin_window_right_separator "█ "
set -g @catppuccin_window_number_position "left"
set -g @catppuccin_window_middle_separator "·"
set -g @catppuccin_window_default_fill "none"
set -g @catppuccin_window_current_fill "all"

set -g @catppuccin_status_modules_left "session"
set -g @catppuccin_status_modules_right "directory"
set -g @catppuccin_status_left_separator "█"
set -g @catppuccin_status_right_separator " "
set -g @catppuccin_status_fill "all"

set -g @catppuccin_directory_text "#{=|-24|…;s|$HOME|~|:pane_current_path}"
set -g @catppuccin_directory_color "#89dceb"
set -g @catppuccin_session_color "" #"#89dceb, #ed8796"

set -g focus-events on
# set -sg escape-time 10

set-option -g base-index 1                # window index will start with 1
set-window-option -g pane-base-index 1    # pane index will start with 1
set-option -g renumber-windows on

set -g status-position top

set -g default-terminal "tmux-256color"
# set -g default-terminal "screen-256color"
set-option -sa terminal-overrides ',tmux-256color:RGB'
# set-option -a terminal-features 'xterm-256color:RGB'

set -g mouse on
set -g extended-keys on

set -g default-command /opt/homebrew/bin/fish
set-option -g default-shell /opt/homebrew/bin/fish

# test https://dev.to/krishnam/tmux-13-cool-tweaks-to-make-it-personal-and-powerful-487p
unbind-key C-b              # free the original bind-key key
set-option -g prefix C-f    # setting the prefix from C-b to C-f
bind-key C-f send-prefix    # ensure that we can send Ctrl-f to other apps or the shell that your interacting

bind-key C-y source-file ~/.config/tmux/tmux.conf \; display "Config Reloaded!"

# set-option -wg automatic-rename off        # default names are too vague to see. Let me name it.

bind-key | split-window -h -c "#{pane_current_path}" # let's open pane with current directory with -c option
bind-key _ split-window -v -c "#{pane_current_path}"

# Pane: Vim Style Movements
#bind-key -r h select-pane -L              # go left
#bind-key -r j select-pane -D              # go down
#bind-key -r l select-pane -R              # go right
#bind-key -r k select-pane -U              # go up

# Vim Style
bind-key -r H resize-pane -L 2         # resize a pane two rows at a time.
bind-key -r J resize-pane -D 2
bind-key -r K resize-pane -U 2
bind-key -r L resize-pane -R 2

# tmux adds a short, almost imperceptible delay between the commands that can cause funny behavior when running vim inside tmux.
set-option -s escape-time 0

# Cool trick: Let's dim out any pane that's not active.
# set-window-option -g window-style fg=white,bg=colour236
# set-window-option -g window-active-style fg=white,bg=colour235

# Enable Activity Alerts
set-option -g status-interval 60           # Update the status line every 60 seconds (15 is default)
set-window-option -g monitor-activity on   # highlights the window name in the status line

# Move windows
bind-key -n C-S-Left swap-window -t -1
bind-key -n C-S-Right swap-window -t +

# bind C-g display-popup -h 99% -w 99% -E "lazygit"
bind C-g display-popup -d '#{pane_current_path}' -h 99% -w 99% -E "lazygit"

bind s choose-tree -sZ -O time # name, index

# TWM
# bind f run-shell "tmux neww twm"
# bind F run-shell "tmux neww twm -l"
# # bind s run-shell "tmux neww twm -e"  # i rebind the original `s` to `S` so I can still use it
# bind g run-shell "tmux neww twm -g"
# bind e run-shell "tmux switch -t $TWM_DEFAULT"  # i set TWM_DEFAULT in my shellrc, just a session that is always available as a scratch area

bind-key "T" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

# bind-key x kill-pane # skip "kill-pane 1? (y/n)" prompt
set -g detach-on-destroy off  # don't exit from tmux when closing a session
bind-key "K" display-popup -h 90% -w 50% -E "sesh picker -i"

bind-key g if-shell "tmux display-message -p '#{window_zoomed_flag}' | grep -q '0'" \
  "resize-pane -Z -t '{left}' \; select-pane -t '{left}'" \
  "resize-pane -Z \; select-pane -t '{right}'"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
